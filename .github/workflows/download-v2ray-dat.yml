name: 自动更新 v2ray 规则文件
on:
  workflow_dispatch:   # 允许手动运行
  schedule:
    - cron: '0 19 * * *'  # 每天 UTC 19:00 = 北京时间 03:00

jobs:
  update-dat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建目录并下载 geoip/geosite
        run: |
          mkdir -p usr/share/v2ray
          wget -O usr/share/v2ray/geoip.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
          wget -O usr/share/v2ray/geosite.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat

      - name: 提交并推送
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add usr/share/v2ray/*
          git commit -m "Auto update v2ray geoip & geosite [$(date +'%Y-%m-%d')]" || exit 0
          git push
